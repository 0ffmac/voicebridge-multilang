<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060b18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VoiceBridge · EN ↔ ID</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060b18;
    --surface: #0d1428;
    --surface2: #131d35;
    --border: rgba(99,179,237,0.15);
    --accent: #38bdf8;
    --accent2: #818cf8;
    --accent3: #34d399;
    --danger: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: 0 0 40px rgba(56,189,248,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -20%, rgba(56,189,248,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(129,140,248,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 24px;
  }

  header {
    padding: 20px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .logo span { color: var(--accent2); }

  .model-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
  }

  .lang-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 16px;
    margin-bottom: 20px;
  }

  .lang-tag {
    flex: 1;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 6px 10px;
    border-radius: 10px;
    transition: all 0.3s;
  }
  .lang-tag.active-en { background: rgba(56,189,248,0.15); color: var(--accent); }
  .lang-tag.active-id { background: rgba(52,211,153,0.15); color: var(--accent3); }
  .lang-tag.inactive { color: var(--muted); }

  .swap-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .swap-btn:active { transform: rotate(180deg) scale(0.9); color: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    transition: border-color 0.3s;
  }
  .card.active { border-color: rgba(56,189,248,0.4); box-shadow: var(--glow); }

  .card-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card-text {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    line-height: 1.6;
    min-height: 56px;
    word-break: break-word;
    color: var(--text);
  }
  .card-text.placeholder { color: var(--muted); font-style: italic; }

  .card-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }
  .icon-btn:active { transform: scale(0.94); color: var(--accent); }

  .result-card {
    background: linear-gradient(135deg, rgba(52,211,153,0.05), rgba(129,140,248,0.05));
    border-color: rgba(52,211,153,0.2);
  }
  .result-card .card-label { color: var(--accent3); }
  .result-card .card-text { color: #a7f3d0; }

  .mic-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px 0;
    flex: 1;
    justify-content: center;
  }

  .mic-outer {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .mic-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(56,189,248,0.2);
  }
  .mic-ring.pulse { animation: ringPulse 1.2s ease-out infinite; }
  .mic-ring:nth-child(2) { animation-delay: 0.4s; }
  .mic-ring:nth-child(3) { animation-delay: 0.8s; }

  @keyframes ringPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .mic-btn {
    position: absolute;
    inset: 20px;
    border-radius: 50%;
    background: linear-gradient(145deg, #0f2040, #0a1628);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .mic-btn.recording {
    background: linear-gradient(145deg, #1a0f30, #0f0820);
    border-color: rgba(248,113,113,0.5);
    box-shadow: 0 0 40px rgba(248,113,113,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .mic-btn.processing {
    border-color: rgba(56,189,248,0.5);
    animation: processingPulse 1.5s ease-in-out infinite;
  }
  @keyframes processingPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(56,189,248,0.1); }
    50% { box-shadow: 0 0 40px rgba(56,189,248,0.3); }
  }
  .mic-btn:active { transform: scale(0.96); }

  .mic-icon { font-size: 2rem; transition: all 0.3s; user-select: none; }

  .mic-status {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
    height: 20px;
    transition: all 0.3s;
  }
  .mic-status.recording-status { color: var(--danger); }
  .mic-status.processing-status { color: var(--accent); }
  .mic-status.success-status { color: var(--accent3); }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.visible { opacity: 1; }
  .wave-bar {
    width: 3px;
    background: var(--danger);
    border-radius: 2px;
    animation: waveAnim 0.6s ease-in-out infinite alternate;
    min-height: 4px;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { animation-delay: 0.3s; }
  .wave-bar:nth-child(7) { animation-delay: 0.2s; }
  .wave-bar:nth-child(8) { animation-delay: 0.1s; }
  .wave-bar:nth-child(9) { animation-delay: 0s; }

  @keyframes waveAnim {
    from { height: 4px; }
    to { height: 28px; }
  }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: var(--danger);
    margin-bottom: 14px;
    display: none;
    line-height: 1.5;
  }
  .error-msg.show { display: block; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.8rem;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Voice<span>Bridge</span></div>
    <div class="model-badge">llama-3.1-8b ✦ CF</div>
  </header>

  <div class="error-msg" id="errorMsg"></div>

  <div class="lang-bar">
    <div class="lang-tag" id="srcLang">🇺🇸 ENGLISH</div>
    <button class="swap-btn" onclick="swapLanguage()" title="Swap">⇄</button>
    <div class="lang-tag" id="tgtLang">🇮🇩 INDONESIA</div>
  </div>

  <div class="card" id="inputCard">
    <div class="card-label">// YOU SAID</div>
    <div class="card-text placeholder" id="inputText">Tap the mic and speak...</div>
    <div class="card-actions">
      <button class="icon-btn" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>

  <div class="card result-card" id="outputCard">
    <div class="card-label">// TRANSLATION</div>
    <div class="card-text placeholder" id="outputText">Translation will appear here...</div>
    <div class="card-actions">
      <button class="icon-btn" onclick="speakOutput()">▶ Replay</button>
      <button class="icon-btn" onclick="copyOutput()">⎘ Copy</button>
    </div>
  </div>

  <div class="mic-section">
    <div class="waveform" id="waveform">
      <div class="wave-bar" style="height:8px"></div>
      <div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:22px"></div>
      <div class="wave-bar" style="height:18px"></div>
      <div class="wave-bar" style="height:28px"></div>
      <div class="wave-bar" style="height:18px"></div>
      <div class="wave-bar" style="height:22px"></div>
      <div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:8px"></div>
    </div>

    <div class="mic-outer">
      <div class="mic-ring" id="ring1"></div>
      <div class="mic-ring" id="ring2"></div>
      <div class="mic-ring" id="ring3"></div>
      <button class="mic-btn" id="micBtn" onclick="handleMic()">
        <span class="mic-icon" id="micIcon">🎙️</span>
      </button>
    </div>

    <div class="mic-status" id="micStatus">Tap to speak</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
// Replace this with your deployed Cloudflare Worker URL after deploying
const WORKER_URL = 'https://voicebridge-api.YOUR_SUBDOMAIN.workers.dev';

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  isRecording: false,
  isProcessing: false,
  sourceLang: 'en',
  lastTranslation: '',
  recognition: null,
  recognitionLang: null,   // track which lang recognition was built for
  synthesis: window.speechSynthesis,
  silenceTimer: null,
  lastTranscript: '',
  pendingTranslate: false, // true when we stopped and are waiting to translate
};

updateLangBar();

// ─── Language Swap ────────────────────────────────────────────────────────────
function swapLanguage() {
  state.sourceLang = state.sourceLang === 'en' ? 'id' : 'en';
  // Destroy recognition so it's rebuilt with the new language
  destroyRecognition();
  updateLangBar();
  clearAll();
}

function updateLangBar() {
  const srcEl = document.getElementById('srcLang');
  const tgtEl = document.getElementById('tgtLang');
  if (state.sourceLang === 'en') {
    srcEl.textContent = '🇺🇸 ENGLISH';
    srcEl.className = 'lang-tag active-en';
    tgtEl.textContent = '🇮🇩 INDONESIA';
    tgtEl.className = 'lang-tag active-id';
  } else {
    srcEl.textContent = '🇮🇩 INDONESIA';
    srcEl.className = 'lang-tag active-id';
    tgtEl.textContent = '🇺🇸 ENGLISH';
    tgtEl.className = 'lang-tag active-en';
  }
}

// ─── Mic ──────────────────────────────────────────────────────────────────────
function handleMic() {
  if (state.isProcessing) return;
  if (state.isRecording) {
    // Manual stop — translate whatever we have
    state.pendingTranslate = !!state.lastTranscript;
    stopListening();
  } else {
    startRecording();
  }
}

function destroyRecognition() {
  if (state.recognition) {
    state.recognition.onstart = null;
    state.recognition.onresult = null;
    state.recognition.onerror = null;
    state.recognition.onend = null;
    try { state.recognition.abort(); } catch(e) {}
    state.recognition = null;
    state.recognitionLang = null;
  }
}

function buildRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return false;

  const lang = state.sourceLang === 'en' ? 'en-US' : 'id-ID';

  // Reuse existing instance if same language — avoids iOS permission re-prompt
  if (state.recognition && state.recognitionLang === lang) return true;

  destroyRecognition();

  const rec = new SpeechRecognition();
  rec.lang = lang;
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    state.isRecording = true;
    state.lastTranscript = '';
    setUIRecording();
    resetSilenceTimer();
  };

  rec.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }
    state.lastTranscript = (final || interim).trim();
    setInputText(state.lastTranscript, !final);
    resetSilenceTimer();
    if (final) {
      state.pendingTranslate = true;
      stopListening();
    }
  };

  rec.onerror = (e) => {
    clearTimeout(state.silenceTimer);
    state.isRecording = false;
    setUIIdle();
    // not-allowed = permission denied permanently
    if (e.error === 'not-allowed') {
      destroyRecognition(); // force rebuild next time
      showError('Microphone permission denied. Please allow mic access in your browser settings.');
    } else if (e.error !== 'aborted' && e.error !== 'no-speech') {
      showError('Mic error: ' + e.error);
    }
  };

  rec.onend = () => {
    clearTimeout(state.silenceTimer);
    state.isRecording = false;
    setUIIdle();
    if (state.pendingTranslate && state.lastTranscript) {
      state.pendingTranslate = false;
      translate(state.lastTranscript);
    }
  };

  state.recognition = rec;
  state.recognitionLang = lang;
  return true;
}

function startRecording() {
  hideError();
  if (!buildRecognition()) {
    showError('Speech recognition not supported. Use Safari on iPhone or Chrome on Android.');
    return;
  }
  state.pendingTranslate = false;
  state.lastTranscript = '';
  try {
    state.recognition.start();
  } catch(e) {
    // Already started — ignore
  }
}

function stopListening() {
  clearTimeout(state.silenceTimer);
  if (state.recognition) {
    try { state.recognition.stop(); } catch(e) {}
  }
  // onend will fire and handle the translate
}

function resetSilenceTimer() {
  clearTimeout(state.silenceTimer);
  state.silenceTimer = setTimeout(() => {
    if (state.isRecording) {
      if (state.lastTranscript) {
        state.pendingTranslate = true;
        stopListening();
      } else {
        stopListening();
      }
    }
  }, 2000);
}

// ─── Translation ──────────────────────────────────────────────────────────────
async function translate(text) {
  if (!text.trim()) return;

  state.isProcessing = true;
  setUIProcessing();

  try {
    const res = await fetch(`${WORKER_URL}/translate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, sourceLang: state.sourceLang }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const translation = data.translation;
    state.lastTranslation = translation;
    setOutputText(translation);
    setUISuccess();
    await speakTranslation(translation, state.sourceLang === 'en' ? 'id-ID' : 'en-US');

  } catch (err) {
    setUIIdle();
    showError('Translation failed: ' + err.message);
  } finally {
    state.isProcessing = false;
  }
}

// ─── TTS ──────────────────────────────────────────────────────────────────────
async function speakTranslation(text, lang) {
  return new Promise((resolve) => {
    if (!state.synthesis) { resolve(); return; }
    state.synthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 0.95;
    utt.pitch = 1;
    utt.volume = 1;
    const voices = state.synthesis.getVoices();
    const match = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
    if (match) utt.voice = match;
    utt.onend = resolve;
    utt.onerror = resolve;
    state.synthesis.speak(utt);
  });
}

function speakOutput() {
  if (!state.lastTranslation) return;
  const targetLang = state.sourceLang === 'en' ? 'id-ID' : 'en-US';
  speakTranslation(state.lastTranslation, targetLang);
  showToast('▶ Playing...');
}

function copyOutput() {
  if (!state.lastTranslation) return;
  navigator.clipboard.writeText(state.lastTranslation)
    .then(() => showToast('⎘ Copied!'))
    .catch(() => showToast('Could not copy'));
}

// ─── UI State ─────────────────────────────────────────────────────────────────
function setUIRecording() {
  document.getElementById('micBtn').className = 'mic-btn recording';
  document.getElementById('micIcon').textContent = '⏹';
  document.getElementById('micStatus').textContent = 'Listening... tap to stop';
  document.getElementById('micStatus').className = 'mic-status recording-status';
  document.getElementById('waveform').classList.add('visible');
  ['ring1','ring2','ring3'].forEach(id => document.getElementById(id).classList.add('pulse'));
  document.getElementById('inputCard').classList.add('active');
}

function setUIProcessing() {
  document.getElementById('micBtn').className = 'mic-btn processing';
  document.getElementById('micIcon').textContent = '⟳';
  document.getElementById('micStatus').textContent = 'Translating...';
  document.getElementById('micStatus').className = 'mic-status processing-status';
  document.getElementById('waveform').classList.remove('visible');
  ['ring1','ring2','ring3'].forEach(id => document.getElementById(id).classList.remove('pulse'));
}

function setUISuccess() {
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micIcon').textContent = '🎙️';
  document.getElementById('micStatus').textContent = '✓ Done — tap to translate again';
  document.getElementById('micStatus').className = 'mic-status success-status';
  document.getElementById('inputCard').classList.remove('active');
}

function setUIIdle() {
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micIcon').textContent = '🎙️';
  document.getElementById('micStatus').textContent = 'Tap to speak';
  document.getElementById('micStatus').className = 'mic-status';
  document.getElementById('waveform').classList.remove('visible');
  ['ring1','ring2','ring3'].forEach(id => document.getElementById(id).classList.remove('pulse'));
  document.getElementById('inputCard').classList.remove('active');
}

function setInputText(text, interim) {
  const el = document.getElementById('inputText');
  el.textContent = text;
  el.className = 'card-text' + (interim ? ' placeholder' : '');
}

function setOutputText(text) {
  const el = document.getElementById('outputText');
  el.textContent = text;
  el.className = 'card-text';
}

function clearAll() {
  document.getElementById('inputText').textContent = 'Tap the mic and speak...';
  document.getElementById('inputText').className = 'card-text placeholder';
  document.getElementById('outputText').textContent = 'Translation will appear here...';
  document.getElementById('outputText').className = 'card-text placeholder';
  state.lastTranslation = '';
  hideError();
  setUIIdle();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  window.speechSynthesis.getVoices();
}
</script>
</body>
</html>
